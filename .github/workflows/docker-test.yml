name: Docker Test

# Docker-based testing for RuleSync-first .NET agent harness
# Provides isolated, reproducible testing across all 7 targets

on:
  push:
    branches: [main, develop]
    paths:
      - '.rulesync/**'
      - 'rulesync.jsonc'
      - 'docker-compose.yml'
      - 'Dockerfile*'
      - 'docker/**'
      - '.github/workflows/docker-test.yml'
  pull_request:
    paths:
      - '.rulesync/**'
      - 'rulesync.jsonc'
      - 'docker-compose.yml'
      - 'Dockerfile*'
      - 'docker/**'
      - '.github/workflows/docker-test.yml'
  workflow_dispatch:
    inputs:
      rulesync_version:
        description: 'RuleSync version to test'
        required: false
        default: '7.10.0'
        type: string
      targets:
        description: 'Targets to test (comma-separated or "all")'
        required: false
        default: 'all'
        type: string

env:
  RULESYNC_VERSION: ${{ inputs.rulesync_version || '7.10.0' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Build and cache Docker images
  # ============================================================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test runner image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.test
          push: false
          load: true
          tags: rulesync-test-runner:latest
          build-args: |
            RULESYNC_VERSION=${{ env.RULESYNC_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export test runner image
        run: |
          docker save rulesync-test-runner:latest | gzip > /tmp/rulesync-test-runner.tar.gz

      - name: Upload test runner image
        uses: actions/upload-artifact@v4
        with:
          name: test-runner-image
          path: /tmp/rulesync-test-runner.tar.gz
          retention-days: 1

  # ============================================================================
  # Individual target tests (parallel)
  # ============================================================================
  test-target:
    name: Test Target - ${{ matrix.target }}
    needs: build-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - claudecode
          - opencode
          - copilot
          - geminicli
          - codexcli
          - factorydroid
          - antigravity
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Download test runner image
        uses: actions/download-artifact@v4
        with:
          name: test-runner-image
          path: /tmp

      - name: Load test runner image
        run: |
          docker load < /tmp/rulesync-test-runner.tar.gz

      - name: Test target generation
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -e TARGET=${{ matrix.target }} \
            -e RULESYNC_TARGETS=${{ matrix.target }} \
            -e CI=true \
            rulesync-test-runner:latest \
            validate-target

      - name: Upload generated outputs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: generated-outputs-${{ matrix.target }}
          path: |
            .agent/
            .claude/
            .codex/
            .gemini/
            .opencode/
            AGENTS.md
            CLAUDE.md
            GEMINI.md
          if-no-files-found: ignore

  # ============================================================================
  # Determinism check
  # ============================================================================
  determinism:
    name: Determinism Check
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Download test runner image
        uses: actions/download-artifact@v4
        with:
          name: test-runner-image
          path: /tmp

      - name: Load test runner image
        run: |
          docker load < /tmp/rulesync-test-runner.tar.gz

      - name: Run determinism check
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -e CI=true \
            rulesync-test-runner:latest \
            check-determinism

  # ============================================================================
  # Documentation contract validation
  # ============================================================================
  doc-contract:
    name: Documentation Contract
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Download test runner image
        uses: actions/download-artifact@v4
        with:
          name: test-runner-image
          path: /tmp

      - name: Load test runner image
        run: |
          docker load < /tmp/rulesync-test-runner.tar.gz

      - name: Validate documentation contract
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -e CI=true \
            rulesync-test-runner:latest \
            validate-doc-contract

  # ============================================================================
  # Full validation suite (all checks)
  # ============================================================================
  validate-all:
    name: Full Validation Suite
    needs: [build-images, test-target, determinism, doc-contract]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Download test runner image
        uses: actions/download-artifact@v4
        with:
          name: test-runner-image
          path: /tmp

      - name: Load test runner image
        run: |
          docker load < /tmp/rulesync-test-runner.tar.gz

      - name: Run full validation
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -e CI=true \
            rulesync-test-runner:latest \
            validate-all

  # ============================================================================
  # Summary and reporting
  # ============================================================================
  summary:
    name: Test Summary
    needs: [test-target, determinism, doc-contract, validate-all]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# Docker Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Target Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY

          for target in claudecode opencode copilot geminicli codexcli factorydroid antigravity; do
            status="✅ Passed"
            # Check if any of the required jobs failed
            if [[ "${{ needs.test-target.result }}" == "failure" ]]; then
              status="❌ Failed"
            fi
            echo "| $target | $status |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Other Checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          determinism_status="✅ Passed"
          if [[ "${{ needs.determinism.result }}" == "failure" ]]; then
            determinism_status="❌ Failed"
          fi
          echo "- Determinism Check: $determinism_status" >> $GITHUB_STEP_SUMMARY

          doc_status="✅ Passed"
          if [[ "${{ needs.doc-contract.result }}" == "failure" ]]; then
            doc_status="❌ Failed"
          fi
          echo "- Documentation Contract: $doc_status" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## RuleSync Version" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ env.RULESYNC_VERSION }}" >> $GITHUB_STEP_SUMMARY

      - name: Report overall status
        run: |
          if [[ "${{ needs.test-target.result }}" == "failure" ]] || \
             [[ "${{ needs.determinism.result }}" == "failure" ]] || \
             [[ "${{ needs.doc-contract.result }}" == "failure" ]]; then
            echo "Some tests failed!"
            exit 1
          fi
          echo "All tests passed!"
