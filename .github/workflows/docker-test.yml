name: Docker Test Matrix

on:
  push:
    branches: [main, develop]
    paths:
      - '.rulesync/**'
      - 'rulesync.jsonc'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'scripts/docker/**'
  pull_request:
    branches: [main]
    paths:
      - '.rulesync/**'
      - 'rulesync.jsonc'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'scripts/docker/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-test-base

jobs:
  # Build and push base image
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push base image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log RuleSync version
        run: |
          docker run --rm ${{ steps.meta.outputs.tags }} rulesync --version

  # Run matrix tests across all 7 targets
  test-matrix:
    runs-on: ubuntu-latest
    needs: build-base
    strategy:
      fail-fast: false
      matrix:
        target:
          - claudecode
          - opencode
          - copilot
          - geminicli
          - codexcli
          - antigravity
          - factorydroid

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base image
        run: |
          docker pull ${{ needs.build-base.outputs.image-tag }}

      - name: Test target - ${{ matrix.target }}
        run: |
          echo "Testing target: ${{ matrix.target }}"
          docker run --rm \
            -v "${{ github.workspace }}:/workspace:ro" \
            -v "test-results-${{ matrix.target }}:/generated" \
            ${{ needs.build-base.outputs.image-tag }} \
            sh -c "
              echo '=== RuleSync Version ===' &&
              rulesync --version &&
              echo '=== Testing ${{ matrix.target }} ===' &&
              rulesync generate --targets ${{ matrix.target }} --output /generated --silent &&
              echo '=== Verifying output ===' &&
              ls -la /generated/ &&
              echo 'Target ${{ matrix.target }} completed successfully'
            "

      - name: Upload target artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-${{ matrix.target }}
          path: /tmp/generated-${{ matrix.target }}
          retention-days: 1

  # Run full validation suite
  validate:
    runs-on: ubuntu-latest
    needs: build-base

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base image
        run: |
          docker pull ${{ needs.build-base.outputs.image-tag }}

      - name: Run validation suite
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace:ro" \
            -v "${{ github.workspace }}/test-results:/test-results" \
            ${{ needs.build-base.outputs.image-tag }} \
            /workspace/scripts/docker/validate-all.sh

      - name: Upload validation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-results
          path: test-results/
          retention-days: 7

  # Run full test suite
  test-suite:
    runs-on: ubuntu-latest
    needs: build-base

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build test runner image
        run: |
          docker build -f Dockerfile.test -t test-runner:latest .

      - name: Run full test suite
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace:ro" \
            -v "${{ github.workspace }}/test-results:/test-results" \
            -e TEST_OUTPUT_DIR=/test-results \
            test-runner:latest \
            --output /test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Display test summary
        if: always()
        run: |
          if [[ -f "test-results/results.json" ]]; then
            echo "Test Results:"
            cat test-results/results.json | jq '.'
          fi

  # Summary job
  summary:
    runs-on: ubuntu-latest
    needs: [test-matrix, validate, test-suite]
    if: always()

    steps:
      - name: Test Summary
        run: |
          echo "=========================================="
          echo "Docker Test Matrix Summary"
          echo "=========================================="
          echo "Build Base: ${{ needs.build-base.result }}"
          echo "Test Matrix: ${{ needs.test-matrix.result }}"
          echo "Validation: ${{ needs.validate.result }}"
          echo "Test Suite: ${{ needs.test-suite.result }}"
          echo "=========================================="

          if [[ "${{ needs.test-matrix.result }}" == "success" && \
                "${{ needs.validate.result }}" == "success" && \
                "${{ needs.test-suite.result }}" == "success" ]]; then
            echo "All tests passed!"
            exit 0
          else
            echo "Some tests failed!"
            exit 1
          fi
