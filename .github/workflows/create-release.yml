name: Create GitHub Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore Tools
        run: dotnet tool restore

      - name: Get Version
        id: version
        run: |
          VERSION=$(dotnet dotnet-gitversion /showvariable SemVer)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Milestone: $VERSION"

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts
          run-id: ${{ github.event.workflow_run.id }}

      - name: Create Rules Bundle
        run: |
          cd .rulesync && zip -r ../rules-bundle.zip . && cd ..
          echo "Created rules-bundle.zip"

      - name: Setup GitReleaseManager
        uses: gittools/actions/gitreleasemanager/setup@v1.1.0
        with:
          versionSpec: '0.18.x'

      - name: Create Release with GitReleaseManager
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Create release using GRM
          dotnet dotnet-gitreleasemanager create \
            --owner ${{ github.repository_owner }} \
            --repository ${{ github.event.repository.name }} \
            --token $GITHUB_TOKEN \
            --milestone "$VERSION" \
            --name "v$VERSION" \
            --targetDirectory .
          
          # Upload assets
          dotnet dotnet-gitreleasemanager addasset \
            --owner ${{ github.repository_owner }} \
            --repository ${{ github.event.repository.name }} \
            --token $GITHUB_TOKEN \
            --milestone "$VERSION" \
            --assets "artifacts/*.nupkg,rules-bundle.zip"

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json \
            --skip-duplicate
