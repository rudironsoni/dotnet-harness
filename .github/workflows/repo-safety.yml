name: Repo Safety Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repo-safety:
    name: repo-safety
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ripgrep

      - name: Run ripgrep safety scan
        run: |
          set -e
          # Patterns: OpenAI-like sk-, SendGrid SG., AWS AKIA, connection password, TODO/FIXME/HACK/XXX, broad catch(Exception)
          RG='(?i)(sk-[A-Za-z0-9_-]{8,}|SG\.[A-Za-z0-9_-]{8,}|AKIA[A-Z0-9]{16}|Server=.*Password=<DB_PASSWORD_PLACEHOLDER>;|\b(TODO|FIXME|HACK|XXX)\b|catch\s*\(\s*Exception\s*\))'
          echo "Scanning repository for high-risk patterns..."
          rg --hidden --line-number --no-ignore -S -n -e "$RG" || true
          # Fail if any matches
          if rg --hidden --line-number --no-ignore -S -n -e "$RG" >/dev/null; then
            echo "Repository safety check failed: sensitive patterns or TODOs found." >&2
            rg --hidden --line-number --no-ignore -S -n -e "$RG" >&2
            exit 1
          fi
