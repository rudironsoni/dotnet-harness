name: Repo Safety Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repo-safety:
    name: repo-safety
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ripgrep

      - name: Run ripgrep safety scan
        run: |
          set -euo pipefail

          # Scan tracked files only to make results deterministic and avoid being
          # influenced by locally-generated/untracked content.
          #
          # Patterns: token-like secrets, AWS access keys, and likely-credentialed connection strings.
          # NOTE: Build the regex from concatenated strings so this workflow doesn't match itself.

          SK_PREFIX='s''k-'
          SG_PREFIX='S''G.'
          AWS_AKIA='A''KIA'
          PASSWORD='P''assword'

          RG="(?i)(${SK_PREFIX}[A-Za-z0-9_-]{8,}|${SG_PREFIX}[A-Za-z0-9_-]{8,}|${AWS_AKIA}[A-Z0-9]{16}|Server=.*${PASSWORD}=|${PASSWORD}=.*;)"

          echo "Scanning tracked files for secret-like patterns..."
          if rg --null --files-from <(git ls-files -z) --line-number -S -n -e "$RG"; then
            echo "Repository safety check failed: secret-like patterns found in tracked files." >&2
            exit 1
          fi
