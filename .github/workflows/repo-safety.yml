name: Repo Safety Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  repo-safety:
    name: repo-safety
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ripgrep

      - name: Run ripgrep safety scan
        run: |
          set -euo pipefail

          # Scan tracked files only to make results deterministic and avoid being
          # influenced by locally-generated/untracked content.
          #
          # Patterns: token-like secrets, AWS access keys, and likely-credentialed connection strings.
          # NOTE: Build the regex from concatenated strings so this workflow doesn't match itself.

          SK_PREFIX='s''k-'
          SG_PREFIX='S''G.'
          AWS_AKIA='A''KIA'
          PWD_KEY='P''assword'

          # Treat placeholders like "<DB_PASSWORD_PLACEHOLDER>" as non-secrets by requiring
          # the first value character to not be '<'.
          # Add word-boundaries to reduce false positives (e.g., "task-...").
          RG="(?i)(\b${SK_PREFIX}[A-Za-z0-9_-]{8,}|\b${SG_PREFIX}[A-Za-z0-9_-]{8,}|\b${AWS_AKIA}[A-Z0-9]{16}|Server=[^\r\n]*\b${PWD_KEY}=[^;<\r\n][^;\r\n]*|\b${PWD_KEY}=[^;<\r\n][^;\r\n]*;|\b${PWD_KEY}=\s*[^\s;<\r\n][^;\r\n]*)"

          echo "Scanning tracked files for secret-like patterns..."

          # Avoid relying on ripgrep flags that may vary across distros.
          # We scan tracked files only, using NUL-separated paths for safety.
          tmp_out="$(mktemp)"
          tmp_err="$(mktemp)"
          trap 'rm -f "$tmp_out" "$tmp_err"' EXIT

          git ls-files -z \
            | xargs -0 -r -- rg --line-number -S -n -e "$RG" -- \
            >"$tmp_out" 2>"$tmp_err" || true

          if [ -s "$tmp_err" ]; then
            cat "$tmp_err" >&2
            exit 2
          fi

          if [ -s "$tmp_out" ]; then
            cat "$tmp_out"
            echo "Repository safety check failed: secret-like patterns found in tracked files." >&2
            exit 1
          fi
