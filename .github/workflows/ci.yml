name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # Job 0: Check PR title follows conventional commits (required for merge)
  check-pr-title:
    name: Check PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Check Conventional Commit Format
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            BREAKING CHANGE
          requireScope: false
          subjectPattern: ^[A-Z].*$
          subjectPatternError: |
            The subject must start with an uppercase letter.
          disallowScopes: |
            release
          validateSingleCommit: false
          
      - name: Label PR
        uses: actions/labeler@v4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/pr-labeler.yml

  # Job 1: Validation (Safety, Shell, Dependencies)
  validate:
    name: Validate
    needs: [check-pr-title]
    if: always() && (needs.check-pr-title.result == 'success' || needs.check-pr-title.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for GitVersion to calculate versions

      - name: Check no .env files committed
        run: |
          if [ -f .env ]; then
            echo "❌ Error: .env file should not be committed"
            exit 1
          fi
          echo "✓ No .env file found"

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

      - name: Validate shell scripts exist
        run: |
          echo "Checking required shell scripts..."
          [ -f install-dotnet-agent-harness.sh ] || (echo "❌ install-dotnet-agent-harness.sh not found" && exit 1)
          [ -f .rulesync/hooks/dotnet-agent-harness-session-start.sh ] || (echo "❌ session-start hook not found" && exit 1)
          [ -f .rulesync/hooks/dotnet-agent-harness-post-edit-roslyn.sh ] || (echo "❌ post-edit-roslyn hook not found" && exit 1)
          [ -f .rulesync/hooks/dotnet-agent-harness-slopwatch.sh ] || (echo "❌ slopwatch hook not found" && exit 1)
          [ -f .rulesync/hooks/dotnet-agent-harness-error-recovery.sh ] || (echo "❌ error-recovery hook not found" && exit 1)
          [ -f .rulesync/hooks/dotnet-agent-harness-inline-error-recovery.sh ] || (echo "❌ inline-error-recovery hook not found" && exit 1)
          echo "✓ All required shell scripts present"

      - name: Check shell script syntax
        run: |
          echo "Validating shell script syntax..."
          bash -n install-dotnet-agent-harness.sh
          for hook in .rulesync/hooks/*.sh; do
            bash -n "$hook"
          done
          echo "✓ All shell scripts have valid syntax"

      - name: Run shellcheck
        run: |
          if command -v shellcheck &> /dev/null; then
            echo "Running shellcheck..."
            # Only fail on actual errors, not info/style warnings (SC2310, SC2312, etc.)
            shellcheck --severity=error install-dotnet-agent-harness.sh
            for hook in .rulesync/hooks/*.sh; do
              shellcheck --severity=error "$hook"
            done
            echo "✓ Shellcheck passed (no errors)"
          else
            echo "⚠ shellcheck not installed, skipping"
          fi

  # Job 2: Build, Test, and Smoke Test CLI
  build:
    name: Build & Test
    needs: [validate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for GitVersion to calculate versions

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v0.10.2
        with:
          versionSpec: '5.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v0.10.2

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore dotnet-agent-harness.slnx

      - name: Build
        run: dotnet build dotnet-agent-harness.slnx --no-restore -c Release

      - name: Test
        run: dotnet test dotnet-agent-harness.slnx --no-build -c Release --logger trx --results-directory TestResults

      - name: Smoke Test - CLI Version
        run: |
          cd src/DotnetAgentHarness.Cli
          dotnet run -- version

      - name: Setup Node.js for rulesync
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install rulesync
        run: npm install -g rulesync

      - name: Smoke Test - CLI Install (dry-run)
        if: runner.os == 'Linux'
        run: |
          mkdir -p /tmp/test-install
          cd src/DotnetAgentHarness.Cli
          dotnet run -- install --dry-run --force --path /tmp/test-install --targets claudecode

      - name: Pack CLI Tool
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet pack src/DotnetAgentHarness.Cli/ \
            --no-build -c Release \
            -o artifacts \
            -p:Version=${{ steps.gitversion.outputs.semVer }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults/**/*.trx

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
          retention-days: 30

      - name: Create Milestone
        if: matrix.os == 'ubuntu-latest' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.gitversion.outputs.semVer }}"
          
          # Check if milestone exists
          MILESTONE_EXISTS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/milestones?state=all" | \
            jq -r --arg v "$VERSION" '.[] | select(.title == $v) | .title')
          
          if [ -z "$MILESTONE_EXISTS" ]; then
            echo "Creating milestone $VERSION"
            curl -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/milestones \
              -d "{\"title\":\"$VERSION\",\"state\":\"open\"}"
          else
            echo "Milestone $VERSION already exists"
          fi
