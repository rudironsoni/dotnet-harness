name: Bundle Packaging

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  generate-bundles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install RuleSync
        run: |
          curl -L https://github.com/dyoshikawa/rulesync/releases/latest/download/rulesync-linux-x64 -o /usr/local/bin/rulesync
          chmod +x /usr/local/bin/rulesync
      
      - name: Generate bundles
        run: |
          rulesync generate -t "*" -f "*"
      
      - name: Create bundle archives
        run: |
          mkdir -p bundles
          # Archive each generated target directory (these are created by rulesync)
          for dir in .claude .cline .cursor .junie .kilocode .kiro .roo .agents .clinerules; do
            if [ -d "$dir" ]; then
              target_name=$(echo "$dir" | sed 's/^\.//')
              tar -czf "bundles/${target_name}.tar.gz" "$dir"
            fi
          done
          # Archive GitHub Copilot instructions if generated
          if [ -f ".github/copilot-instructions.md" ]; then
            tar -czf "bundles/github-copilot.tar.gz" .github/copilot-instructions.md
          fi
      
      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles
          path: bundles/*.tar.gz
          retention-days: 30
