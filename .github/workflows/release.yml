name: Release

# Only run after CI workflow completes successfully on main branch
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # Job 1: Verify CI succeeded
  verify-ci:
    name: Verify CI Success
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: CI succeeded
        run: echo "✓ CI workflow completed successfully, proceeding with release"

  # Job 2: Auto-tag
  auto-tag:
    name: Auto Tag
    needs: [verify-ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore tools
        run: dotnet tool restore

      - name: Get version from GitVersion
        id: version
        run: |
          VERSION=$(dotnet dotnet-gitversion /showvariable SemVer)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if tag exists
        id: check-tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag v$VERSION does not exist"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        id: tag
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Created tag: v$VERSION"

  # Job 3: Create GitHub Release
  release:
    name: Create Release
    needs: [auto-tag]
    if: needs.auto-tag.outputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js for rulesync
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install rulesync
        run: npm install -g rulesync

      - name: Package rules bundle
        run: |
          cd .rulesync && zip -r ../rules-bundle.zip . && cd ..
          echo "Created rules-bundle.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.auto-tag.outputs.tag }}
          name: Release ${{ needs.auto-tag.outputs.tag }}
          body: |
            ## Release ${{ needs.auto-tag.outputs.tag }}

            ### Installation

            Install the toolkit in your .NET repository using curl:

            ```bash
            # One-line installer
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/main/install-dotnet-agent-harness.sh | bash
            ```

            Or with options:

            ```bash
            # Download and run with specific targets
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/main/install-dotnet-agent-harness.sh | bash -s -- --targets claudecode,copilot,opencode
            ```

            The installer will:
            1. Fetch the `.rulesync/` configuration from this repository
            2. Download required hook scripts
            3. Generate agent configurations for your specified targets

            That's it! The toolkit is now installed and ready to use.

            ### Package Contents
            - rules-bundle.zip - Contains all skills, subagents, commands, and hooks
          files: |
            rules-bundle.zip
