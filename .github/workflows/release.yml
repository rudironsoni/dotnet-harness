name: Release

# Only run after CI workflow completes successfully on main branch
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # Job 1: Verify CI succeeded
  verify-ci:
    name: Verify CI Success
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: CI succeeded
        run: echo "✓ CI workflow completed successfully, proceeding with release"

  # Job 2: Auto-tag
  auto-tag:
    name: Auto Tag
    needs: [verify-ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            7.0.x
            10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Get version from GitVersion
        id: version
        run: |
          VERSION=$(dotnet dotnet-gitversion /showvariable SemVer)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if tag exists
        id: check-tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag v$VERSION does not exist"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        id: tag
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Created tag: v$VERSION"

  # Job 3: Build and pack
  build:
    name: Build & Pack
    needs: [verify-ci, auto-tag]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            7.0.x
            10.0.x

      - name: Restore
        run: dotnet restore dotnet-agent-harness.slnx

      - name: Build
        run: dotnet build dotnet-agent-harness.slnx --no-restore -c Release

      - name: Test
        run: dotnet test dotnet-agent-harness.slnx --no-build -c Release

      - name: Pack
        run: |
          dotnet pack src/DotnetAgentHarness.Cli/ \
            --no-build -c Release \
            -o artifacts \
            -p:Version=${{ needs.auto-tag.outputs.version }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg

  # Job 4: Create GitHub Release with GitReleaseManager
  release:
    name: Create Release
    needs: [build, auto-tag]
    if: needs.auto-tag.outputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts

      - name: Package rules bundle
        run: |
          cd .rulesync && zip -r ../rules-bundle.zip . && cd ..
          echo "Created rules-bundle.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.auto-tag.outputs.tag }}
          name: Release ${{ needs.auto-tag.outputs.tag }}
          body: |
            ## Release ${{ needs.auto-tag.outputs.tag }}
            
            ### Installation
            
            #### Via GitHub Packages (Recommended)
            ```bash
            dotnet tool install -g dotnet-agent-harness --add-source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
            ```
            
            #### Via GitHub Releases
            Download the `.nupkg` from this release and install locally:
            ```bash
            dotnet tool install -g dotnet-agent-harness --add-source ./path/to/download
            ```
            
            ### Prerequisites
            - .NET 10.0 SDK or later
            - Node.js 22 or later (for rulesync)
            
            ### Package Contents
            - DotnetAgentHarness.Cli.${{ needs.auto-tag.outputs.version }}.nupkg
            - rules-bundle.zip
          files: |
            artifacts/*.nupkg
            rules-bundle.zip

  # Job 5: Publish to GitHub Packages
  publish:
    name: Publish to GitHub Packages
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json \
            --skip-duplicate
