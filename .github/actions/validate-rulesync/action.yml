name: Validate RuleSync Generation
description: Validate RuleSync generation outputs and determinism

runs:
  using: composite
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "10.0.x"
        include-prerelease: true

    - name: Validate documentation contract
      shell: bash
      run: |
        echo "Validating capability metadata documentation contract..."
        bash "$GITHUB_WORKSPACE/scripts/ci/validate_doc_contract.sh"

    - name: Validate subagent frontmatter
      shell: bash
      run: |
        echo "Validating subagent frontmatter..."
        bash "$GITHUB_WORKSPACE/scripts/ci/validate_subagents.sh"

    - name: Validate RuleSync outputs and deterministic generation
      shell: bash
      run: |
        bash "$GITHUB_WORKSPACE/scripts/ci/validate_rulesync.sh"

    - name: Validate runtime contract
      shell: bash
      run: |
        echo "Skipping runtime contract validation (not available)"
